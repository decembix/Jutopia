name: Import Jutopia Prototype

on:
  push:
    branches:
      - codex/jutopia-prototype
    paths:
      - ".github/workflows/import-jutopia.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/jutopia-prototype
          persist-credentials: true

      - name: Download export bundle
        run: |
          curl -fL "https://attach-protocols-ppm-donate.trycloudflare.com/jutopia-export.zip" -o /tmp/jutopia-export.zip
          echo "7CB14D60BEA1E5516B3322EA5E3CC2C40A95A3F8F9F017FBAA30FFDA7BD191FD  /tmp/jutopia-export.zip" | sha256sum -c -

      - name: Unpack source files
        run: |
          unzip -o /tmp/jutopia-export.zip -d .

      - name: Commit imported files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .dockerignore .env.example .gitignore app.js cloud-run.env.yaml.example DEPLOY.md Dockerfile index.html POSTGRES.md requirements.txt server.py styles.css SUPABASE.md db scripts
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Import Jutopia prototype files"
            git push
          fi
